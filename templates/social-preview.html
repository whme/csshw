<!doctype html>
<!--
  Social preview card — 1280×640.

  Rendered to PNG by xtask/social-preview/generate.mjs via headless
  Chromium inside the pinned Playwright Docker image.

  This file is the source of truth for the visual design. The generator
  replaces the `{{PLACEHOLDERS}}` below by plain string substitution —
  nothing else. Designers can open this file directly in a browser (with
  placeholders left literal) to iterate on CSS without running the xtask.

  Constraints:
   - Do not fetch anything from the network.
   - Do not use @media queries — viewport is fixed at 1280×640.
   - Do not add a new placeholder without also teaching generate.mjs about
     it; the contract is intentionally narrow.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>{{REPO_FULL_NAME}} — social preview</title>
    <style>
      @font-face {
        font-family: "DejaVu Sans Mono";
        src: url("{{FONT_DATA_URI}}") format("truetype");
        font-weight: normal;
        font-style: normal;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        width: 1280px;
        height: 640px;
        font-family: "DejaVu Sans Mono", "Courier New", monospace;
        color: #0d1117;
        background: #ffffff;
        overflow: hidden;
      }
      .card {
        box-sizing: border-box;
        width: 1280px;
        height: 640px;
        padding: 56px 72px;
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 24px;
      }
      .header {
        display: flex;
        align-items: center;
        gap: 32px;
      }
      .logo {
        width: 128px;
        height: 128px;
        flex: 0 0 128px;
      }
      .titles .repo-name {
        font-size: 72px;
        font-weight: 700;
        line-height: 1;
      }
      .titles .repo-full {
        font-size: 28px;
        color: #57606a;
        margin-top: 8px;
      }
      .description {
        font-size: 32px;
        line-height: 1.3;
        color: #24292f;
        align-self: center;
      }
      .footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 32px;
      }
      .stars {
        font-size: 36px;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .star-icon {
        width: 40px;
        height: 40px;
      }
      .languages {
        flex: 1;
        max-width: 760px;
      }
      .language-bar {
        display: flex;
        width: 100%;
        height: 16px;
        border-radius: 8px;
        overflow: hidden;
        background: #ededed;
      }
      .language-legend {
        margin-top: 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        font-size: 18px;
        color: #57606a;
      }
      .language-legend .entry {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .language-legend .swatch {
        width: 12px;
        height: 12px;
        border-radius: 2px;
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="header">
        <img class="logo" src="{{LOGO_DATA_URI}}" alt="logo" />
        <div class="titles">
          <div class="repo-name">{{REPO_NAME}}</div>
          <div class="repo-full">{{REPO_FULL_NAME}}</div>
        </div>
      </div>
      <div class="description">{{REPO_DESCRIPTION}}</div>
      <div class="footer">
        <div class="stars">
          <svg
            class="star-icon"
            viewBox="0 0 16 16"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <path
              fill="#d4a72c"
              d="M8 .25a.75.75 0 01.673.418l1.882 3.815 4.21.612a.75.75 0 01.416 1.279l-3.046 2.97.719 4.192a.75.75 0 01-1.088.791L8 12.347l-3.766 1.98a.75.75 0 01-1.088-.79l.72-4.194L.818 6.374a.75.75 0 01.416-1.28l4.21-.611L7.327.668A.75.75 0 018 .25z"
            />
          </svg>
          <span>{{STAR_COUNT}}</span>
        </div>
        <div class="languages">
          <div class="language-bar" id="language-bar"></div>
          <div class="language-legend" id="language-legend"></div>
        </div>
      </div>
    </div>
    <script type="application/json" id="languages">
      {{LANGUAGES_JSON}}
    </script>
    <script>
      (function () {
        // JSON.parse handles both valid payloads and the designer
        // fallback path (template opened directly with the literal
        // {{LANGUAGES_JSON}} placeholder) — the latter throws and we
        // silently leave the bar empty. A stringly-typed guard like
        // `raw === "{{LANGUAGES_JSON}}"` would itself be substituted by
        // generate.mjs, corrupting this script's syntax.
        var raw = document.getElementById("languages").textContent.trim();
        var langs;
        try {
          langs = JSON.parse(raw);
        } catch (e) {
          return;
        }
        if (!Array.isArray(langs) || langs.length === 0) return;
        var bar = document.getElementById("language-bar");
        var legend = document.getElementById("language-legend");
        langs.forEach(function (l) {
          var seg = document.createElement("span");
          seg.style.background = l.color;
          seg.style.width = l.pct + "%";
          seg.style.display = "inline-block";
          seg.style.height = "100%";
          bar.appendChild(seg);

          var entry = document.createElement("span");
          entry.className = "entry";
          var swatch = document.createElement("span");
          swatch.className = "swatch";
          swatch.style.background = l.color;
          entry.appendChild(swatch);
          entry.appendChild(
            document.createTextNode(l.name + " " + l.pct.toFixed(1) + "%"),
          );
          legend.appendChild(entry);
        });
      })();
    </script>
  </body>
</html>
