#
#   csshw Post-Submit CI
#
# Runs on the main branch on pushes with full coverage collection.
# For pull requests, see pre-submit.yml which includes coverage reporting.
# Uses the shared CI workflow.

name: Post-Submit CI

on:
  push:
    branches: ["main"]

jobs:
  ci:
    uses: ./.github/workflows/_shared-ci.yml

  coverage-report:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download Coverage XML Data
        uses: actions/download-artifact@v4
        with:
          name: coverage-xml-data
          path: coverage-data/

      - name: Generate Code Coverage Summary
        id: coverage
        uses: ./.github/workflows/_coverage_report
        with:
          path: coverage-data/coverage.xml

      - name: Write coverage to step summary
        run: echo "${{ steps.coverage.outputs.summary }}" >> $GITHUB_STEP_SUMMARY
